<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="./register.css">
</head>
<body>
    <header class=""><strong><em><dl>  Registration for campus skills </dl></em></strong></header>
    <aside class="lo-container">
        <p>Name:</p>
        <input type="text" name="name" id="name" placeholder="Enter your name">

        <p>Email:</p>
        <input type="email" name="email" id="email" placeholder="Enter your email"> 
        <p>Password:</p>
        <input type="password" name="password" id="password" placeholder="Enter your password">
        <p>Confirm Password:</p>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password">
        <p>Enter your role:</p>
        <select name="role" id="role">
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="instructor">Teacher</option>
            <option value="instructor">Mentor</option>
        </select>
        <p>Date of Birth:</p>
        <input type="date" name="dob" id="dob">
        <p>Gender:</p>
        <select name="gender" id="gender">
            <option value="">Select your gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <a href="./header.html"><button class="btn-primary" id="register-btn">Register</button></a>
    </aside>
</body>
</html>
